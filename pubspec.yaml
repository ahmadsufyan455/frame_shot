name: frame_shot
description: >-
  Add beautiful EXIF metadata frames to your photos.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.0
  riverpod_annotation: ^4.0.0
  go_router: ^14.0.0
  exif: ^3.3.0
  native_exif: ^0.7.0
  image_picker: ^1.2.0
  flutter_svg: ^2.2.0
  geocoding: ^4.0.0
  purchases_flutter: ^10.0.1
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  image: ^4.3.0
  shared_preferences: ^2.3.0
  uuid: ^4.5.0
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0
  build_runner: any

flutter:
  uses-material-design: true
